<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totally Normal Professional Survey</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: transform 0.5s;
        }

        #survey-box {
            background: white;
            padding: 30px;
            border: 5px solid #000;
            box-shadow: 10px 10px 0px #888;
            max-width: 400px;
            text-align: center;
            z-index: 10;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            transition: 0.2s;
            margin: 10px;
        }

        #runaway-btn {
            position: absolute;
            background: #ff4b4b;
        }

        #money-btn {
            background: gold;
            color: black;
            font-weight: bold;
            border: 3px dashed black;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        .input-group {
            margin: 20px 0;
        }

        #message {
            color: blue;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div id="survey-box">
    <h2>Help Us Improve!</h2>
    
    <button id="money-btn" onclick="playTrumpet()">💰 CLICK TO WIN $1,000,000 💰</button>

    <div class="input-group">
        <label>How much do you like this website?</label><br>
        <input type="range" min="0" max="100" value="50" oninput="judge(this.value)">
        <p id="score-text">Status: Indifferent</p>
    </div>

    <div class="input-group">
        <p>Are you a robot?</p>
        <button id="runaway-btn" onmouseover="dodge()">NO</button>
        <button onclick="amRobot()">YES</button>
    </div>

    <div id="message"></div>
</div>

<script>
    const btn = document.getElementById('runaway-btn');
    const scoreText = document.getElementById('score-text');
    const msg = document.getElementById('message');

    // The Trumpet Logic (Using Web Audio API)
    function playTrumpet() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // A sequence of notes for that "Wah-Wah-Wah-Waaaaah" effect
        const notes = [440, 415, 392, 349]; 
        let time = audioCtx.currentTime;

        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sawtooth'; // The "Trumpet-ish" sound
            osc.frequency.setValueAtTime(freq, time);
            
            gain.gain.setValueAtTime(0.2, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.5);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(time);
            osc.stop(time + 0.5);
            time += 0.4;
        });

        msg.innerText = "CONGRATULATIONS! You won... a loud noise!";
    }

    function dodge() {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);
        btn.style.left = x + 'px';
        btn.style.top = y + 'px';
        msg.innerText = "Stop trying to say no.";
    }

    function judge(val) {
        if (val < 20) scoreText.innerText = "Status: Rude.";
        else if (val > 80) scoreText.innerText = "Status: Brown-noser.";
        else scoreText.innerText = "Status: Aggressively Average.";
        document.body.style.transform = `rotate(${val - 50}deg)`;
    }

    function amRobot() {
        alert("Verification successful. Please report to the nearest charging station.");
        window.location.href = "https://www.google.com/search?q=pictures+of+batteries";
    }
</script>

</body>
</html>
